<VirtualHost *:80>
    ServerName iotcloud.selfmade.party 

    WSGIDaemonProcess iotweb user=sibidharan group=sibidharan threads=5 python-home=/home/sibidharan/iotweb/iotcloud
    WSGIScriptAlias / /home/sibidharan/iotweb/app.py

    <Directory /home/sibidharan/iotweb>
        WSGIProcessGroup iotweb
        WSGIApplicationGroup iotweb
        Order deny,allow
        Allow from all
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/iotweb-error.log
    CustomLog ${APACHE_LOG_DIR}/iotweb-access.log combined
</VirtualHost>